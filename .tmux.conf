set -g default-terminal "tmux-256color"
# Truecolor + system-clipboard (OSC52) passthrough to the outer terminal (iTerm)
set -as terminal-features ",xterm-256color:RGB"
set -as terminal-features ",xterm-256color:clipboard"

unbind '%'
unbind '"'

bind '\' split-window -h -c '#{pane_current_path}'
bind '-' split-window -v -c '#{pane_current_path}' 

bind -r j resize-pane -D 5
bind -r k resize-pane -U 5
bind -r l resize-pane -R 5
bind -r h resize-pane -L 5
bind -r m resize-pane -Z

set -g mouse on
# Forward terminal focus events so Neovim's FocusGained fires (autoread/checktime)
set -g focus-events on
set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-pipe-and-cancel 'pbcopy'
bind-key -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel 'pbcopy'

# Enable clipboard integration
set -s set-clipboard on

unbind -T copy-mode-vi MouseDragEnd1Pane

set -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

# Stay inside tmux when the current session is destroyed: jump to the most
# recent session instead of detaching to a bare shell (nice with the sessionizer).
set -g detach-on-destroy off

# Bigger scrollback for build/LSP/Claude output.
set -g history-limit 50000

# Quick config reload.
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# Project switcher in a floating popup (tmux 3.2+); closes cleanly, no leftover window.
bind-key -r f display-popup -E "~/.local/bin/tmux-sessionizer"

# Worktree manager (bare-repo + worktree layout under ~/developer):
#   o    → clone a repo
#   n w  → new worktree in the current repo (chord: prefix, then n, then w)
# Switching between worktrees/projects is handled by the f sessionizer above,
# which lists each worktree as "project/branch".
bind-key o display-popup -w 60% -h 40% -E "~/.local/bin/tmux-worktree clone"
bind-key n switch-client -T worktree
bind-key -T worktree w display-popup -w 60% -h 40% -E "~/.local/bin/tmux-worktree new"
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'jimeh/tmux-themepack'

set -g @themepack 'powerline/default/yellow'

run '~/.tmux/plugins/tpm/tpm'
